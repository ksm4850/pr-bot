server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 정적 파일 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
